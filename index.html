<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#000000">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="電光">
<meta name="description" content="電光掲示板 PWA — 背景の明滅文字が電光メッセージを象る (iPhone / Android / Mac)">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" type="image/png" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DotGothic16&family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
<title>電光 — Marquee</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;overflow:hidden;background:#000;color:#fff;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none;touch-action:manipulation}
  body{font-family:'DotGothic16','Press Start 2P',monospace;display:flex;flex-direction:column;height:100dvh;width:100vw}

  #stage{flex:1;position:relative;overflow:hidden;background:#000;cursor:pointer}
  #rain{position:absolute;inset:0;width:100%;height:100%;display:block;z-index:1}

  /* スキャンライン (LED 走査線) */
  #stage>.scan{position:absolute;inset:0;pointer-events:none;z-index:3;
    background:repeating-linear-gradient(to bottom,
      rgba(255,255,255,.05) 0px,
      rgba(255,255,255,.05) 1px,
      transparent 1px,
      transparent 3px);
    mix-blend-mode:overlay;opacity:.55}
  #stage>.vignette{position:absolute;inset:0;pointer-events:none;z-index:2;
    background:radial-gradient(ellipse at center,transparent 55%,rgba(0,0,0,.7) 100%)}

  /* === クラシック (CSS marquee) === */
  #track{position:absolute;top:50%;left:0;transform:translateY(-50%);white-space:nowrap;display:flex;align-items:center;will-change:transform;z-index:2}
  #track .seg{padding-right:4em;display:inline-block}
  .glow{
    color:#fff;font-size:var(--fs,22vh);line-height:1;letter-spacing:.02em;
    text-shadow:
      0 0 2px #fff,0 0 6px #fff,
      0 0 14px var(--c1,#4cc9ff),0 0 28px var(--c1,#4cc9ff),
      0 0 48px var(--c2,#0a84ff),0 0 72px var(--c2,#0a84ff),
      0 0 110px var(--c3,#0033aa);
    animation:flicker 4.2s infinite;
  }
  @keyframes flicker{
    0%,18%,22%,25%,53%,57%,100%{filter:brightness(1)}
    20%{filter:brightness(1.18)}24%{filter:brightness(.92)}55%{filter:brightness(1.08)}
  }
  @keyframes scroll-left{from{transform:translate(0,-50%)}to{transform:translate(-50%,-50%)}}
  @keyframes scroll-right{from{transform:translate(-50%,-50%)}to{transform:translate(0,-50%)}}
  #track.static{animation:none !important;left:50%;transform:translate(-50%,-50%) !important;text-align:center}
  #track.static .seg{padding-right:0;display:block;text-align:center}
  #track.static .seg+.seg{display:none}

  body.mode-rain #track{display:none}
  body.mode-classic #rain{display:none}

  /* === 設定パネル === */
  #panel{
    position:fixed;left:0;right:0;bottom:0;z-index:10;
    background:rgba(8,12,24,.94);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
    border-top:1px solid rgba(76,201,255,.3);
    padding:14px 18px calc(20px + env(safe-area-inset-bottom)) 18px;
    transform:translateY(105%);transition:transform .35s cubic-bezier(.2,.8,.2,1);
    box-shadow:0 -8px 40px rgba(0,80,180,.25);
    max-height:82vh;overflow-y:auto;
  }
  #panel.open{transform:translateY(0)}
  #panel h2{font-family:'DotGothic16',sans-serif;font-size:14px;color:#7cd3ff;letter-spacing:.15em;margin-bottom:10px;text-shadow:0 0 8px rgba(76,201,255,.6)}
  #panel label{display:block;font-size:12px;color:#9bb;letter-spacing:.1em;margin:12px 0 6px}
  #panel input[type=text],#panel textarea{
    width:100%;background:#000;border:1px solid rgba(76,201,255,.35);color:#fff;
    font-family:'DotGothic16',sans-serif;font-size:18px;padding:10px 12px;border-radius:6px;
    outline:none;transition:border-color .2s,box-shadow .2s;
  }
  #panel input[type=text]:focus,#panel textarea:focus{border-color:#4cc9ff;box-shadow:0 0 0 3px rgba(76,201,255,.2)}
  #panel textarea{resize:vertical;min-height:60px;line-height:1.4}
  #panel input[type=range]{width:100%;accent-color:#4cc9ff}
  .row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
  .row>div{flex:1;min-width:130px}
  .swatches{display:flex;gap:8px;flex-wrap:wrap;margin-top:4px}
  .sw{width:34px;height:34px;border-radius:50%;border:2px solid rgba(255,255,255,.15);cursor:pointer;transition:transform .15s,border-color .15s}
  .sw.active{border-color:#fff;transform:scale(1.12)}
  .seg-btns{display:flex;gap:6px;margin-top:4px;flex-wrap:wrap}
  .seg-btn{flex:1;min-width:80px;padding:8px;background:#000;border:1px solid rgba(76,201,255,.3);color:#9bb;border-radius:6px;font-family:'DotGothic16',sans-serif;font-size:13px;cursor:pointer;transition:all .15s}
  .seg-btn.active{background:rgba(76,201,255,.18);border-color:#4cc9ff;color:#fff;box-shadow:0 0 12px rgba(76,201,255,.3)}
  .actions{display:flex;gap:10px;margin-top:16px}
  .btn{flex:1;padding:12px;background:linear-gradient(135deg,#0a84ff,#4cc9ff);color:#fff;border:none;border-radius:8px;font-family:'DotGothic16',sans-serif;font-size:14px;letter-spacing:.1em;cursor:pointer;box-shadow:0 4px 16px rgba(10,132,255,.4)}
  .btn.ghost{background:transparent;border:1px solid rgba(76,201,255,.4);color:#7cd3ff;box-shadow:none}

  #toggle{position:fixed;top:calc(12px + env(safe-area-inset-top));right:12px;z-index:9;
    width:44px;height:44px;border-radius:50%;background:rgba(8,12,24,.7);border:1px solid rgba(76,201,255,.4);
    color:#7cd3ff;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;
    backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);transition:opacity .3s,transform .2s}
  #toggle:active{transform:scale(.92)}
  #toggle.hidden{opacity:0;pointer-events:none}

  #hint{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);color:rgba(124,211,255,.4);font-size:14px;letter-spacing:.2em;text-align:center;pointer-events:none;z-index:4;animation:fadeOut 4s forwards}
  @keyframes fadeOut{0%,60%{opacity:1}100%{opacity:0}}

  .rain-only,.classic-only{display:none}
  body.mode-rain .rain-only{display:block}
  body.mode-classic .classic-only{display:block}
</style>
</head>
<body class="mode-rain">

<div id="stage">
  <canvas id="rain"></canvas>
  <div id="track"><span class="seg glow"></span><span class="seg glow"></span></div>
  <div class="vignette"></div>
  <div class="scan"></div>
  <div id="hint">画面タップで設定</div>
</div>

<button id="toggle" aria-label="設定">⚙</button>

<div id="panel">
  <h2>⚡ 電光掲示板</h2>

  <label for="msg">メッセージ <span style="color:#6c8a96;font-size:10px;letter-spacing:.05em">(絵文字は反映されません)</span></label>
  <textarea id="msg" rows="2" placeholder="流したい文字を入力" maxlength="200"></textarea>

  <label>モード</label>
  <div class="seg-btns">
    <button class="seg-btn" data-mode="rain">◉ Glyph Rain</button>
    <button class="seg-btn" data-mode="classic">○ クラシック</button>
  </div>

  <div class="row">
    <div>
      <label>速度 <span id="spdVal">中</span></label>
      <input type="range" id="spd" min="5" max="60" value="22" step="1">
    </div>
    <div>
      <label>大きさ <span id="szVal">22</span></label>
      <input type="range" id="sz" min="8" max="50" value="22" step="1">
    </div>
  </div>

  <label>方向</label>
  <div class="seg-btns">
    <button class="seg-btn active" data-dir="left">← 左に流す</button>
    <button class="seg-btn" data-dir="right">右に流す →</button>
    <button class="seg-btn" data-dir="static">■ 静止</button>
  </div>

  <label>電光カラー</label>
  <div class="swatches" id="swatches"></div>

  <label>グロー強度 <span id="glowVal">標準</span></label>
  <input type="range" id="glow" min="0" max="2" value="1" step="1">

  <div class="rain-only">
    <label>背景の文字種 <span id="charsetVal">カタカナ+数字</span></label>
    <input type="range" id="charset" min="0" max="3" value="0" step="1">

    <label>明滅の速さ <span id="flickVal">標準</span></label>
    <input type="range" id="flick" min="0" max="3" value="2" step="1">
  </div>

  <div class="actions">
    <button class="btn" id="closeBtn">閉じて全画面</button>
    <button class="btn ghost" id="fullBtn">フルスクリーン</button>
  </div>
</div>

<script>
// ============================================================
// 設定
// ============================================================
const PALETTES = [
  {name:'電光青',  c1:'#4cc9ff', c2:'#0a84ff', c3:'#0033aa'},
  {name:'白氷',    c1:'#bfe9ff', c2:'#7cd3ff', c3:'#3a80c0'},
  {name:'シアン',  c1:'#5ffbf1', c2:'#0bc4d9', c3:'#0a6478'},
  {name:'藍夜',    c1:'#7aa7ff', c2:'#3b5bdb', c3:'#1a237e'},
  {name:'紫電',    c1:'#c39bff', c2:'#7c4dff', c3:'#311b92'},
  {name:'珊瑚',    c1:'#ffb3a7', c2:'#ff6b6b', c3:'#a8324a'},
  {name:'琥珀',    c1:'#ffd56b', c2:'#ff9d3a', c3:'#a05a00'},
  {name:'若葉',    c1:'#a8ff8b', c2:'#3ddc84', c3:'#0a5d34'},
];
const GLOW_LEVELS = [
  {name:'控えめ', css:`0 0 2px #fff,0 0 4px #fff,0 0 8px var(--c1),0 0 16px var(--c2)`,         canvas:[6,12]},
  {name:'標準',   css:`0 0 2px #fff,0 0 6px #fff,0 0 14px var(--c1),0 0 28px var(--c1),0 0 48px var(--c2),0 0 72px var(--c2),0 0 110px var(--c3)`, canvas:[14,28]},
  {name:'眩しい', css:`0 0 4px #fff,0 0 10px #fff,0 0 22px var(--c1),0 0 44px var(--c1),0 0 70px var(--c2),0 0 110px var(--c2),0 0 160px var(--c3)`, canvas:[28,56]},
];
const CHARSETS = [
  {name:'カタカナ+数字', chars:'アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン0123456789'},
  {name:'英数字+記号',   chars:'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%&*+=<>?/[]{}'},
  {name:'バイナリ',      chars:'01'},
  {name:'藪医者の漢字',  chars:'藪医者学電光掲示板診断推論家庭医療緩和ケアシステム思考認知バイアス'},
];
// 絵文字は Glyph Rain の背景文字としては「密度が高すぎてメッセージが浮き
// 出ない」、CSS marquee (クラシック) でも shadow がメッセージ周囲に太く
// 広がる構造上カラー絵文字が映えず、結局白い豆腐っぽくなる。今は対応を
// 見送り、入力フォームに注記する (たまさん判断 2026-05-28)。
const FONT_STACK = `'DotGothic16', 'Noto Sans CJK JP', monospace`;
const FLICK_LEVELS = [
  {name:'静か',   chgMin:1200, chgMax:4000},
  {name:'ゆるい', chgMin:600,  chgMax:2200},
  {name:'標準',   chgMin:200,  chgMax:1400},
  {name:'激しい', chgMin:60,   chgMax:500},
];

const DEFAULTS = {
  text:'藪医者の学び  Tama Marquee',
  speed:22, size:22, dir:'left', palette:0, glow:1,
  mode:'rain', charset:0, flick:2,
};
const KEY = 'marquee.v2';

let state = (function(){
  try{ return Object.assign({}, DEFAULTS, JSON.parse(localStorage.getItem(KEY)||'{}')); }
  catch{ return {...DEFAULTS}; }
})();
function saveState(){ try{ localStorage.setItem(KEY, JSON.stringify(state)); }catch{} }

// ============================================================
// DOM
// ============================================================
const $  = id => document.getElementById(id);
const track = $('track');
const segs  = track.querySelectorAll('.seg');
const stage = $('stage');
const panel = $('panel');
const toggle = $('toggle');
const swatchesEl = $('swatches');
const canvas = $('rain');
const ctx = canvas.getContext('2d', { alpha:false });

// オフスクリーン: メッセージマスク
const mask = document.createElement('canvas');
const mctx = mask.getContext('2d');
// オフスクリーン: 前景セル (グロー描画用)
const fg = document.createElement('canvas');
const fctx = fg.getContext('2d');

// ============================================================
// クラシック / 共通スタイル適用
// ============================================================
function applyText(){
  segs.forEach(s => s.textContent = state.text || ' ');
  rebuildMask();
}
function applyPalette(){
  const p = PALETTES[state.palette] || PALETTES[0];
  document.documentElement.style.setProperty('--c1', p.c1);
  document.documentElement.style.setProperty('--c2', p.c2);
  document.documentElement.style.setProperty('--c3', p.c3);
}
function applyGlow(){
  const g = GLOW_LEVELS[state.glow] || GLOW_LEVELS[1];
  segs.forEach(s => s.style.textShadow = g.css);
  $('glowVal').textContent = g.name;
}
function applySize(){
  document.documentElement.style.setProperty('--fs', state.size + 'vh');
  $('szVal').textContent = state.size;
  rebuildMask();
}
function applyMotion(){
  if(state.mode === 'classic'){
    if(state.dir === 'static'){
      track.classList.add('static');
      track.style.animation = 'none';
    } else {
      track.classList.remove('static');
      const dur = (65 - state.speed);
      const dir = state.dir === 'right' ? 'scroll-right' : 'scroll-left';
      track.style.animation = `${dir} ${dur}s linear infinite`;
    }
  }
  $('spdVal').textContent = state.speed < 15 ? 'ゆっくり' : state.speed < 30 ? '中' : state.speed < 45 ? '速い' : '爆速';
}
function applyMode(){
  document.body.classList.toggle('mode-rain', state.mode === 'rain');
  document.body.classList.toggle('mode-classic', state.mode === 'classic');
  document.querySelectorAll('[data-mode]').forEach(b => b.classList.toggle('active', b.dataset.mode === state.mode));
  // モード切替の本体: rain 側はフレームループを start/stop する。
  // body class が変わった直後は stage rect が未確定なことがあるので
  // requestAnimationFrame で layout 確定後にリサイズ → start。
  if(state.mode === 'rain'){
    requestAnimationFrame(() => { resizeCanvas(); startRain(); });
  } else {
    stopRain();
  }
  applyMotion();
}

// ============================================================
// Glyph Rain — canvas レンダリング
// ============================================================
let cells = [];
let cellW = 0, cellH = 0, cols = 0, rows = 0, dpr = 1;
let scrollX = 0;
let lastFrame = 0;
let rafId = null;
let stageW = 0, stageH = 0;
let maskWidth = 0; // メッセージ1個分の幅 (繰り返し単位)

function pickChar(){
  const cs = CHARSETS[state.charset].chars;
  return cs.charAt(Math.floor(Math.random() * cs.length));
}

function resizeCanvas(){
  const rect = stage.getBoundingClientRect();
  // rect が 0 ならまだ layout 未確定 — フレームループは黙って止め、
  // 次の resize / load / モード切替で再エントリさせる (RAF retry は
  // 無限ループの温床なのでやめた)。
  if(rect.width < 10 || rect.height < 10) return;

  stageW = rect.width;
  stageH = rect.height;
  // iPhone の Retina 3x をそのまま使うと 1 フレーム当たりの pixel 処理
  // 量が 9 倍になって熱を持つ。dpr は最大 1.5 に抑える。
  dpr = Math.min(window.devicePixelRatio || 1, 1.5);

  canvas.width  = Math.floor(stageW * dpr);
  canvas.height = Math.floor(stageH * dpr);
  canvas.style.width = stageW + 'px';
  canvas.style.height = stageH + 'px';
  ctx.setTransform(dpr,0,0,dpr,0,0);

  // セル数 = メッセージを象るドットマトリクス解像度。
  // 行数 18〜34 (旧 14〜42 を粗くしすぎた 12〜22 から差し戻し)。
  // 漢字 (藪・診断 等) を読ませるには縦 18 ドット以上 = 行 30+ が要る。
  // スライダー size=8 → 34 行 (細密)、size=50 → 18 行 (粗ドット)。
  const targetRows = Math.round(34 - (state.size - 8) * (16 / 42));
  cellH = stageH / targetRows;
  cellW = cellH * 0.58; // 縦長セル (ドットマトリクス感、少し詰めた)
  cols  = Math.ceil(stageW / cellW) + 2;
  rows  = Math.ceil(stageH / cellH);

  const now = performance.now();
  cells = [];
  for(let r = 0; r < rows; r++){
    const row = [];
    for(let c = 0; c < cols; c++){
      row.push({ ch: pickChar(), next: now + 100 + Math.random() * 2000 });
    }
    cells.push(row);
  }

  rebuildMask();
}

function rebuildMask(){
  if(!stageW) return;
  const msg = (state.text || ' ').trim() || ' ';
  // フォントサイズ:
  //   画面高さの 75% を目安 (= 大きく表示)。
  //   ただし縦持ちスマホでは stageW < stageH なので、1 文字で画面横を
  //   越えて 1 文字しか映らずスクロール待ちが長すぎる事故が起きる。
  //   横幅の 55% でもクランプする (= スマホ縦持ちで 1.8 文字程度同時表示)。
  const fs = Math.round(Math.min(stageH * 0.75, stageW * 0.55));

  // 一旦オフスクリーンに描いてメッセージ幅を測定
  mctx.font = `bold ${fs}px ${FONT_STACK}`;
  mctx.textBaseline = 'middle';
  const metrics = mctx.measureText(msg);
  const msgW = Math.ceil(metrics.width);
  const gap  = Math.round(fs * 1.2); // メッセージ間スペース
  maskWidth  = msgW + gap;

  // マスク canvas は (maskWidth * 2) で seamless 用に同じメッセージを2回描く
  mask.width  = Math.max(2, Math.floor(maskWidth * 2 * dpr));
  mask.height = Math.max(2, Math.floor(stageH * dpr));
  mctx.setTransform(dpr,0,0,dpr,0,0);
  mctx.clearRect(0, 0, maskWidth * 2, stageH);
  mctx.fillStyle = '#fff';
  mctx.font = `bold ${fs}px ${FONT_STACK}`;
  mctx.textBaseline = 'middle';
  // 軽くぼかしてマスクを膨らませる (シャープなエッジより馴染む)
  mctx.shadowColor = '#fff';
  mctx.shadowBlur = Math.max(2, fs * 0.04);
  mctx.fillText(msg, 0, stageH / 2);
  mctx.fillText(msg, maskWidth, stageH / 2);
  mctx.shadowBlur = 0;
}

// 30fps スロットル: iPhone Safari で 60fps × shadowBlur 付き fillText
// は確実に熱を持つ。電光掲示板の見栄えに 60fps は不要 (人間の目には
// 30fps でも十分に明滅・スクロールが滑らかに見える)。
const FRAME_INTERVAL = 33; // ms — ≒30fps

function tick(now){
  if(!lastFrame) lastFrame = now;
  const dt = now - lastFrame;
  if(dt < FRAME_INTERVAL){
    rafId = requestAnimationFrame(tick);
    return;
  }
  // dt は最大 60ms にクランプ (タブ復帰時の巨大ジャンプ抑制)
  const stepDt = Math.min(60, dt);
  lastFrame = now;

  // スクロール
  if(state.dir !== 'static'){
    const v = state.speed * 0.08; // px / ms 換算
    scrollX += (state.dir === 'left' ? 1 : -1) * v * stepDt;
  }
  if(maskWidth){
    scrollX = ((scrollX % maskWidth) + maskWidth) % maskWidth;
  }

  // 文字明滅 — 全セル走査は重いので毎フレーム最大 N 個だけランダム
  // 更新する。N は cells 数の 1/8 程度。flick "激しい" でも体感上十分。
  const flick = FLICK_LEVELS[state.flick];
  const cellCount = rows * cols;
  const updatesPerFrame = Math.max(1, Math.floor(cellCount / 8));
  for(let i = 0; i < updatesPerFrame; i++){
    const r = Math.floor(Math.random() * rows);
    const c = Math.floor(Math.random() * cols);
    const cell = cells[r][c];
    if(now >= cell.next){
      cell.ch = pickChar();
      cell.next = now + flick.chgMin + Math.random() * (flick.chgMax - flick.chgMin);
    }
  }

  // 背景クリア
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, stageW, stageH);

  const p = PALETTES[state.palette];
  const fontSize = cellH * 0.78;
  ctx.font = `${fontSize}px ${FONT_STACK}`;
  ctx.textBaseline = 'middle';
  ctx.textAlign = 'center';

  // === Layer A: 背景セル (薄い dim) — shadow なし ===
  // dim alpha を sin 揺らぎで微妙に変化させる (オーラ感)。
  // 0.12 → 0.06 に更に下げてもう一段地味に。メッセージとの段差最大化。
  const dimBase = `rgba(${hexR(p.c2)},${hexG(p.c2)},${hexB(p.c2)},`;
  for(let r = 0; r < rows; r++){
    const y = r * cellH + cellH / 2;
    const rowSin = 0.06 + Math.sin((now + r * 137) * 0.0008) * 0.03;
    ctx.fillStyle = dimBase + rowSin.toFixed(3) + ')';
    for(let c = 0; c < cols; c++){
      const x = c * cellW + cellW / 2;
      ctx.fillText(cells[r][c].ch, x, y);
    }
  }

  // === メッセージ範囲を打ち抜き ===
  // destination-out で mask の白 (= メッセージの形) 部分を透明化 →
  // stage の CSS 背景 (#000) が透けて純黒に。これでメッセージ部の
  // dim 文字がガッツリ消え、続けて乗せる白文字 + glow が周囲と
  // ハッキリした明暗差で浮き出る。
  ctx.globalCompositeOperation = 'destination-out';
  const sxCut = -scrollX;
  ctx.drawImage(mask, sxCut, 0, maskWidth, stageH);
  ctx.drawImage(mask, sxCut + maskWidth, 0, maskWidth, stageH);
  ctx.drawImage(mask, sxCut - maskWidth, 0, maskWidth, stageH);
  ctx.globalCompositeOperation = 'source-over';

  // === Layer B: メッセージ部分 (グロー 1 段で軽量化) ===
  // 旧実装は shadow 2 段 (外側青 + 内側白) で seg 全セル分の fillText を
  // 2 回 = 重さの 80%。1 段に絞っても見栄えは十分。
  if(fg.width !== canvas.width || fg.height !== canvas.height){
    fg.width = canvas.width;
    fg.height = canvas.height;
    fctx.setTransform(dpr,0,0,dpr,0,0);
  }
  fctx.clearRect(0, 0, stageW, stageH);
  // 前景は文字を太く + 少し大きく + glow は控えめ。
  // 旧 bold → 900 (Black) + cellH * 0.78 → 0.92 で 1セル目一杯。
  // glow blur は GLOW_LEVELS の半分に絞ってメッセージ輪郭をシャープに
  // (滲ませすぎると周囲の dim と混ざって読みづらくなる)。
  const fgFontSize = cellH * 0.92;
  fctx.font = `900 ${fgFontSize}px ${FONT_STACK}`;
  fctx.textBaseline = 'middle';
  fctx.textAlign = 'center';

  const [b1] = GLOW_LEVELS[state.glow].canvas;
  fctx.shadowColor = p.c1;
  fctx.shadowBlur = Math.round(b1 * 0.5);
  fctx.fillStyle = '#ffffff';
  for(let r = 0; r < rows; r++){
    const y = r * cellH + cellH / 2;
    for(let c = 0; c < cols; c++){
      const x = c * cellW + cellW / 2;
      fctx.fillText(cells[r][c].ch, x, y);
    }
  }
  fctx.shadowBlur = 0;

  // メッセージマスクで切り抜き (seamless に 3 枚タイル)
  fctx.globalCompositeOperation = 'destination-in';
  const sx = -scrollX;
  fctx.drawImage(mask, sx, 0, maskWidth, stageH);
  fctx.drawImage(mask, sx + maskWidth, 0, maskWidth, stageH);
  fctx.drawImage(mask, sx - maskWidth, 0, maskWidth, stageH);
  fctx.globalCompositeOperation = 'source-over';

  ctx.drawImage(fg, 0, 0, stageW, stageH);

  rafId = requestAnimationFrame(tick);
}

function startRain(){
  if(rafId) return;
  lastFrame = 0;
  rafId = requestAnimationFrame(tick);
}
function stopRain(){
  if(rafId){ cancelAnimationFrame(rafId); rafId = null; }
}

// ============================================================
// Color util
// ============================================================
function hexR(h){return parseInt(h.slice(1,3),16)}
function hexG(h){return parseInt(h.slice(3,5),16)}
function hexB(h){return parseInt(h.slice(5,7),16)}

// ============================================================
// UI bind
// ============================================================
function renderSwatches(){
  swatchesEl.innerHTML = '';
  PALETTES.forEach((p, i) => {
    const el = document.createElement('div');
    el.className = 'sw' + (i === state.palette ? ' active' : '');
    el.style.background = `radial-gradient(circle at 35% 35%, #fff 0%, ${p.c1} 30%, ${p.c2} 70%, ${p.c3} 100%)`;
    el.title = p.name;
    el.addEventListener('click', () => {
      state.palette = i;
      saveState(); applyPalette(); renderSwatches();
    });
    swatchesEl.appendChild(el);
  });
}
function renderDirBtns(){
  document.querySelectorAll('[data-dir]').forEach(b => b.classList.toggle('active', b.dataset.dir === state.dir));
}

function bind(){
  $('msg').value = state.text;
  $('spd').value = state.speed;
  $('sz').value  = state.size;
  $('glow').value = state.glow;
  $('charset').value = state.charset;
  $('flick').value = state.flick;
  $('charsetVal').textContent = CHARSETS[state.charset].name;
  $('flickVal').textContent = FLICK_LEVELS[state.flick].name;

  $('msg').addEventListener('input', e => { state.text = e.target.value; saveState(); applyText(); });
  $('spd').addEventListener('input', e => { state.speed = +e.target.value; saveState(); applyMotion(); });
  $('sz').addEventListener('input', e => { state.size = +e.target.value; saveState(); applySize(); if(state.mode==='rain') resizeCanvas(); });
  $('glow').addEventListener('input', e => { state.glow = +e.target.value; saveState(); applyGlow(); });
  $('charset').addEventListener('input', e => {
    state.charset = +e.target.value; saveState();
    $('charsetVal').textContent = CHARSETS[state.charset].name;
  });
  $('flick').addEventListener('input', e => {
    state.flick = +e.target.value; saveState();
    $('flickVal').textContent = FLICK_LEVELS[state.flick].name;
  });
  document.querySelectorAll('[data-dir]').forEach(b => {
    b.addEventListener('click', () => { state.dir = b.dataset.dir; saveState(); applyMotion(); renderDirBtns(); });
  });
  document.querySelectorAll('[data-mode]').forEach(b => {
    b.addEventListener('click', () => { state.mode = b.dataset.mode; saveState(); applyMode(); });
  });

  stage.addEventListener('click', () => { if(!panel.classList.contains('open')) openPanel(); });
  toggle.addEventListener('click', e => { e.stopPropagation(); panel.classList.contains('open') ? closePanel() : openPanel(); });
  $('closeBtn').addEventListener('click', closePanel);
  $('fullBtn').addEventListener('click', goFullscreen);
  document.addEventListener('keydown', e => { if(e.key === 'Escape') closePanel(); });

  window.addEventListener('resize', () => {
    if(state.mode === 'rain') resizeCanvas();
  });
  document.addEventListener('visibilitychange', () => {
    if(document.hidden) stopRain();
    else if(state.mode === 'rain') startRain();
  });
}

function openPanel(){ panel.classList.add('open'); toggle.classList.add('hidden'); }
function closePanel(){ panel.classList.remove('open'); toggle.classList.remove('hidden'); }
function goFullscreen(){
  const el = document.documentElement;
  if(document.fullscreenElement){ document.exitFullscreen(); return; }
  if(el.requestFullscreen) el.requestFullscreen();
  else if(el.webkitRequestFullscreen) el.webkitRequestFullscreen();
  closePanel();
}

// ============================================================
// 起動
// ============================================================
applyText();
applyPalette();
applyGlow();
applySize();
renderSwatches();
renderDirBtns();
bind();
applyMode();

// Web font 読み込み完了後にマスクを再描画 (フォント未ロード時に幅が狂うため)
if(document.fonts && document.fonts.ready){
  document.fonts.ready.then(() => { rebuildMask(); });
}

if(state.mode === 'rain'){ startRain(); }

// PWA standalone 起動の初回 paint で stage rect が 0 になるケースの保険。
// applyMode → resizeCanvas が走っているが、load 後にもう一度回しておくと
// レイアウト確定後にちゃんと cells が組まれる。
window.addEventListener('load', () => {
  if(state.mode === 'rain') resizeCanvas();
});

if('serviceWorker' in navigator){
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  });
}
</script>
</body>
</html>
